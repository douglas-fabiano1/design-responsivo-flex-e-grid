<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propriedade Flex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <h2>Seu Projeto Web - Propriedade Flex</h2>
    <h3>flex: 0 1 auto</h3>
    <article class="container">
        <section class="box box-1 flex-ex01">1</section>
        <section class="box box-2 flex-ex01">2</section>
        <section class="box box-3 flex-ex01">3</section>
        <section class="box box-4 flex-ex01">4</section>
    </article>
    <h3>flex: 1</h3>
    <article class="container">
        <section class="box box-1 flex-ex02">1</section>
        <section class="box box-2 flex-ex02">2</section>
        <section class="box box-3 flex-ex02">3</section>
        <section class="box box-4 flex-ex02">4</section>
    </article>
    <h3>flex: 2 1 200px</h3>
    <article class="container">
        <section class="box box-1 flex-ex03">1</section>
        <section class="box box-2 flex-ex03">2</section>
        <section class="box box-3 flex-ex03">3</section>
        <section class="box box-4 flex-ex03">4</section>
    </article>
</body>

</html>
