<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <h2>Seu Projeto Web - CSS Grid Layout</h2>
    <h3>Usando auto-fit</h3>
    <article class="container auto-fit">
        <section class="box box-1">1</section>
        <section class="box box-2">2</section>
        <section class="box box-3">3</section>
        <section class="box box-4">4</section>
    </article>
    <h3>Usando auto-fill</h3>
    <article class="container auto-fill">
        <section class="box box-1">1</section>
        <section class="box box-2">2</section>
        <section class="box box-3">3</section>
        <section class="box box-4">4</section>
    </article>
</body>

</html>
